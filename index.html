<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Temu Kembali Informasi</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="container">

        <div class="hero">

            <h1>Sistem Temu Kembali</h1>
            <h1>Liputan6</h1>

            <p>
                Pencarian berita menggunakan TF-IDF,
                Cosine Similarity dan Query Expansion
            </p>

            <div class="search-box">
                <input type="text" id="query" placeholder="Masukkan kata kunci...">

                <button onclick="searchDoc()">
                    Cari
                </button>
            </div>

            <div class="option">
                <label>
                    <input type="checkbox" id="expand" checked>
                    Gunakan Query Expansion
                </label>
            </div>

        </div>

        <!-- INFO HASIL -->
        <div id="search-info">

            <div class="stats-bar">

                <div class="stat">
                    <span id="total-result">0</span>
                    <small>Hasil</small>
                </div>

                <div class="stat">
                    <span id="search-time">0</span>
                    <small>ms</small>
                </div>

                <div class="stat">
                    <span id="search-mode">QE ON</span>
                    <small>Mode</small>
                </div>

            </div>

        </div>

        <div class="evaluation-card">

            <h2>📊 Evaluasi Sistem</h2>

            <div class="eval-inputs">

                <input type="number" id="groundTruth" placeholder="Ground Truth (jumlah dokumen relevan)">

                <input type="number" id="truePositive" placeholder="Dokumen relevan yang ditemukan (TP)">

                <button onclick="calculateMetrics()">
                    Hitung Evaluasi
                </button>

            </div>

            <div id="evaluation-result"></div>

        </div>

        <!-- HASIL PENCARIAN -->
        <div id="results"></div>

    </div>

    <script src="script.js"></script>

</body>
